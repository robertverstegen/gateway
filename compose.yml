services:
  # ── Postgres (local dev only — Azure uses managed Azure Database for PostgreSQL) ──
  postgres:
    image: postgres:16-alpine
    container_name: llm-gateway-db
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: gateway
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  # ── Gateway ─────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway-svc
      dockerfile: Dockerfile
    container_name: llm-gateway
    ports:
      - "3000:3000"
    networks:
      - public
      - internal
    environment:
      PORT: 3000
      ADMIN_PORT: 3001
      ADMIN_BIND: "0.0.0.0"
      DATABASE_URL: postgres://gateway:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/gateway
      PGSSL: disable
      ADMIN_KEY: ${ADMIN_KEY:-changeme}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Admin UI ─────────────────────────────────────────────────────────────────
  # 'admin-facing' network handles host → container traffic (port 8086)
  # 'internal' network handles container → gateway:3001 traffic (no internet)
  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    container_name: llm-gateway-admin
    ports:
      - "8086:8086"
    networks:
      - admin-facing
      - internal
    environment:
      PORT: 8086
      GATEWAY_ADMIN_URL: http://gateway:3001
      ADMIN_KEY: ${ADMIN_KEY:-changeme}
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-admin}
    depends_on:
      - gateway
    restart: unless-stopped

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true    # gateway ↔ admin-ui only, no internet
  admin-facing:
    driver: bridge    # admin-ui ↔ host/nginx, no internal: true

volumes:
  pgdata:
