version: '3.9'

services:

  # ── Gateway ─────────────────────────────────────────────────────────────────
  # Exposed to the internet: only port 3000 (completions API)
  # Admin port 3001 is on the internal network only — never published
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-gateway
    ports:
      - "3000:3000"       # Public: completions API
      # Port 3001 (admin API) is deliberately NOT published here.
      # It is only reachable from other containers on the 'internal' network.
    volumes:
      - gateway-data:/data
    networks:
      - public
      - internal
    environment:
      PORT: 3000
      ADMIN_PORT: 3001
      ADMIN_BIND: "0.0.0.0"   # Bind on all interfaces so admin-ui can reach it internally
      DB_PATH: /data/gateway.db
      ADMIN_KEY: ${ADMIN_KEY:-changeme}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
    restart: unless-stopped

  # ── Admin UI ─────────────────────────────────────────────────────────────────
  # Internal only: no public network, no direct internet access.
  # Only reachable on port 8080 from the host (or via a VPN / internal proxy).
  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    container_name: llm-gateway-admin
    ports:
      - "127.0.0.1:8080:8080"   # Bind to loopback only — not reachable from internet
    networks:
      - internal                  # Can reach gateway:3001, cannot reach internet
    environment:
      PORT: 8080
      GATEWAY_ADMIN_URL: http://gateway:3001
      ADMIN_KEY: ${ADMIN_KEY:-changeme}
      # Optional: protect the UI itself with HTTP basic auth
      UI_USERNAME: ${UI_USERNAME:-}
      UI_PASSWORD: ${UI_PASSWORD:-}
    depends_on:
      - gateway
    restart: unless-stopped

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true    # Docker blocks all outbound internet traffic on this network

volumes:
  gateway-data:
    driver: local
